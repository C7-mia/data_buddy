<!DOCTYPE html>
<html>
<head>
    <title>Data Buddy Web</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        input, button { padding: 10px; margin: 10px 0; }
        .results { margin-top: 20px; }
        .metric { display: inline-block; margin: 10px; padding: 10px; background: #f0f0f0; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Data Buddy - Web Analysis</h1>
        <input type="file" id="file" accept=".csv" />
        <button onclick="analyzeFile()">Analyze</button>
        
        <div id="results" class="results"></div>
    </div>

    <script>
        function analyzeFile() {
            let file = document.getElementById('file').files[0];
            let formData = new FormData();
            formData.append('file', file);
            
            fetch('/api/analyze', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    let report = data.report;
                    document.getElementById('results').innerHTML = `
                        <h2>Results</h2>
                        <div class="metric"><strong>Mean:</strong> ${report.basics.mean}</div>
                        <div class="metric"><strong>Std Dev:</strong> ${report.statistical_rigor.std_dev}</div>
                        <div class="metric"><strong>Outliers:</strong> ${report.outliers.count}</div>
                        <div class="metric"><strong>Quality:</strong> ${report.data_quality.rating}</div>
                        <img src="${data.chart}" style="max-width: 100%; margin-top: 20px;">
                    `;
                }
            });
        }
    </script>
</body>
</html>
