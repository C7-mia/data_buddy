name: CI (Lint & Test)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Quality Tools
      run: |
        python -m pip install --upgrade pip
        pip install black isort autoflake flake8 pytest

    - name: Auto-fix and Lint
      run: |
        autoflake --in-place --remove-all-unused-imports -r .
        isort .
        black .
        # This fixes your 'flake8: command not found' error
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Commit fixes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: automated linting and formatting fixes"

  test:
    needs: quality # Wait for quality to finish so we test the fixed code
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Library
      run: |
        python -m pip install --upgrade pip
        # Use '.' to install your local code as a library
        pip install . 
        pip install pytest flake8 black 
    
    - name: Run Tests
      run: pytest -v
