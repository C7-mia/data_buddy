name: Tests & Linting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  autofix:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install formatters
      run: |
        python -m pip install --upgrade pip
        pip install black isort autoflake

    - name: Auto-fix style
      run: |
        black .
        isort .
        autoflake --in-place --remove-all-unused-imports -r .

    - name: Commit auto-fixes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: auto-format with black/isort/autoflake"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Lint with flake8
      run: |
        flake8 data_buddy/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 data_buddy/ --count --max-complexity=10 --statistics
    
    - name: Format check with black
      run: black --check data_buddy/ test_buddy.py test_statistics.py test_run.py
    
    - name: Run tests with pytest
      run: pytest -v
